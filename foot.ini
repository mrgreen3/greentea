# greentea's foot config.
#
# This is foot itself, unmodified upstream, just configured. Install to
# ~/.config/foot/foot.ini (or symlink this file there).
#
# See `man 5 foot.ini` for the full option reference — this only sets
# what greentea actually needs plus a few sane defaults.

[main]
font=JetBrains Mono:size=11
dpi-aware=yes
pad=8x8x

[colors]
# Left deliberately minimal for now — pick a real palette once the
# AI round-trip is proven and you're not context-switching every commit.
background=14171a
foreground=e8e6e1

[key-bindings]
# Ctrl+Shift+A: pipe the currently visible screen to the companion
# script, which queries the model and shows the answer via walker.
#
# pipe-visible only sends what's on screen right now, not full
# scrollback — deliberate for v1, keeps the payload small and fast.
# Swap to pipe-scrollback later if visible-only proves too narrow.
pipe-visible=[/home/kev/.local/bin/greentea-ask] Control+Shift+a
