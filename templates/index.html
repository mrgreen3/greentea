<title>greentea</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface-2: #21262d;
  --border:    #30363d;
  --green:     #3fb950;
  --green-dim: #1a3025;
  --cyan:      #58c4dc;
  --cyan-dim:  #0e2a35;
  --text:      #c9d1d9;
  --text-muted:#6e7681;
  --mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  --radius: 4px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13.5px;
  line-height: 1.6;
  overflow: hidden;
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  user-select: none;
}

.logo {
  color: var(--green);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.logo::before {
  content: '🍵 ';
  font-size: 13px;
}

#clear-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 3px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
#clear-btn:hover {
  color: var(--text);
  border-color: var(--text-muted);
}
#clear-btn:focus-visible {
  outline: 2px solid var(--green);
  outline-offset: 2px;
}

/* ── Message Log ── */
#messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 0 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Message Rows ── */
.msg-row {
  display: flex;
  padding: 0 16px;
}
.msg-row.user   { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }

.bubble {
  max-width: 76%;
  padding: 9px 13px;
  border-radius: var(--radius);
  word-break: break-word;
  white-space: pre-wrap;
}

.bubble img {
  max-height: 200px;
  width: auto;
  max-width: 100%;
  border-radius: 6px;
  display: inline-block;
  margin: 4px 4px 4px 0;
  cursor: pointer;
  object-fit: cover;
}

.status-pill {
  font-size: 0.75rem;
  color: var(--green);
  opacity: 0.6;
  padding: 2px 16px;
  font-style: italic;
}

.bubble.user {
  background: var(--cyan-dim);
  border: 1px solid color-mix(in srgb, var(--cyan) 35%, transparent);
  color: var(--cyan);
}

.bubble.assistant {
  background: var(--green-dim);
  border-left: 2px solid var(--green);
  border-top: 1px solid color-mix(in srgb, var(--green) 20%, transparent);
  border-right: 1px solid color-mix(in srgb, var(--green) 20%, transparent);
  border-bottom: 1px solid color-mix(in srgb, var(--green) 20%, transparent);
  color: var(--text);
}

/* markdown inside assistant bubble */
.bubble.assistant p { margin-bottom: 0.5em; }
.bubble.assistant p:last-child { margin-bottom: 0; }
.bubble.assistant code {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 1px 4px;
  font-size: 12px;
  color: var(--green);
}
.bubble.assistant pre {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  overflow-x: auto;
  margin: 6px 0;
}
.bubble.assistant pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--text);
}
.bubble.assistant ul, .bubble.assistant ol {
  padding-left: 1.4em;
  margin-bottom: 0.5em;
}
.bubble.assistant h1, .bubble.assistant h2, .bubble.assistant h3 {
  color: var(--green);
  margin-bottom: 0.3em;
  font-weight: 600;
}
.bubble.assistant a { color: var(--cyan); }
.bubble.assistant strong { color: var(--text); font-weight: 600; }
.bubble.assistant em { color: var(--text-muted); font-style: italic; }
.bubble.assistant blockquote {
  border-left: 2px solid var(--border);
  padding-left: 10px;
  color: var(--text-muted);
  margin: 4px 0;
}

/* ── Typing indicator ── */
.typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 11px 13px;
}
.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
  40%           { opacity: 1;   transform: scale(1); }
}

/* ── Input Area ── */
#input-area {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

#input {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13.5px;
  line-height: 1.6;
  padding: 8px 11px;
  resize: none;
  min-height: 38px;
  max-height: 180px;
  overflow-y: auto;
  transition: border-color 0.15s;
  field-sizing: content;
}
#input::placeholder { color: var(--text-muted); }
#input:focus {
  outline: none;
  border-color: var(--green);
}
#input::-webkit-scrollbar { width: 4px; }
#input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#send-btn {
  background: var(--green);
  border: none;
  border-radius: var(--radius);
  color: #0d1117;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 0 14px;
  height: 38px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
#send-btn:hover { opacity: 0.85; }
#send-btn:disabled { opacity: 0.35; cursor: default; }
#send-btn:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 2px;
}

/* ── Empty state ── */
#empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--text-muted);
  font-size: 12px;
  letter-spacing: 0.04em;
  pointer-events: none;
}
#empty-state .hint-title {
  color: var(--green);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.06em;
}
#empty-state .hint-sub {
  color: var(--text-muted);
  font-size: 11px;
}

@media (prefers-reduced-motion: reduce) {
  .typing-dot { animation: none; opacity: 0.6; }
}
</style>

<div id="app">
  <header id="header">
    <span class="logo">greentea</span>
    <button id="clear-btn" title="Clear conversation">/clear</button>
  </header>

  <div id="messages">
    <div id="empty-state">
      <span class="hint-title">greentea</span>
      <span class="hint-sub">Enter to send &nbsp;·&nbsp; Shift+Enter for newline</span>
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="ask something..." rows="1" autocomplete="off" spellcheck="false"></textarea>
    <button id="send-btn">send</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── Session ID ── */
  const sessionId = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
  );

  // Override marked image renderer to wrap in a link (click = full size)
  marked.use({ renderer: {
    image({ href, title, text }) {
      return `<a href="${href}" target="_blank" rel="noopener"><img src="${href}" alt="${text}" title="${title||text}"></a>`;
    }
  }});

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const emptyState  = document.getElementById('empty-state');

  let streaming = false;

  /* ── Scroll ── */
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ── Add message bubble ── */
  function addBubble(role, text) {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    if (text) bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  /* ── Typing indicator ── */
  function addTyping() {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing-row';
    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant typing';
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  function hideEmpty() {
    if (emptyState) emptyState.style.display = 'none';
  }

  function showEmpty() {
    if (emptyState) emptyState.style.display = '';
  }

  /* ── Send message ── */
  async function send() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    streaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addBubble('user', text);
    const typingRow = addTyping();

    let assistantBubble = null;
    let rawContent = '';
    let typingRemoved = false;

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Session-Id': sessionId,
        },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!resp.ok) {
        removeTyping();
        addBubble('assistant', 'error: ' + resp.status + ' ' + resp.statusText);
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // hold incomplete line

        let eventType = 'message';
        for (const line of lines) {
          if (line.startsWith('event:')) {
            eventType = line.slice(6).trim();
            continue;
          }
          if (!line.startsWith('data:')) {
            if (line === '') eventType = 'message'; // blank line resets event type
            continue;
          }
          const payload = line.slice(5).trim();
          if (!payload || payload === '[DONE]') { eventType = 'message'; continue; }

          // status event — show as dim pill above the bubble
          if (eventType === 'status') {
            let label;
            try { label = JSON.parse(payload); } catch { label = payload; }
            const pill = document.createElement('div');
            pill.className = 'status-pill';
            pill.textContent = '⟳ ' + label;
            messages.appendChild(pill);
            scrollBottom();
            eventType = 'message';
            continue;
          }

          // tool_result event — render directly (images, etc.)
          if (eventType === 'tool_result') {
            let md;
            try { md = JSON.parse(payload); } catch { md = payload; }
            if (!typingRemoved) { removeTyping(); typingRemoved = true; }
            const resultBubble = addBubble('assistant', '');
            resultBubble.innerHTML = marked.parse(md);
            scrollBottom();
            eventType = 'message';
            continue;
          }

          // Default: text chunk for the assistant bubble
          if (!assistantBubble) {
            if (!typingRemoved) { removeTyping(); typingRemoved = true; }
            assistantBubble = addBubble('assistant', '');
          }

          let chunk = payload;
          try {
            const parsed = JSON.parse(payload);
            chunk = (typeof parsed === 'string') ? parsed : (parsed.chunk ?? parsed.text ?? parsed.content ?? payload);
          } catch (_) {}

          rawContent += chunk;
          assistantBubble.textContent = rawContent;
          scrollBottom();
          eventType = 'message';
        }
      }

      // Final: render markdown
      if (assistantBubble && rawContent) {
        assistantBubble.innerHTML = marked.parse(rawContent);
        scrollBottom();
      } else if (!typingRemoved) {
        removeTyping();
        addBubble('assistant', '(no response)');
      }

    } catch (err) {
      removeTyping();
      if (assistantBubble) {
        assistantBubble.textContent = rawContent || ('error: ' + err.message);
      } else {
        addBubble('assistant', 'error: ' + err.message);
      }
    } finally {
      streaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  /* ── Clear ── */
  async function clearChat() {
    if (streaming) return;
    try {
      await fetch('/clear', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Session-Id': sessionId,
        },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch (_) { /* best effort */ }

    // Clear all message bubbles
    while (messagesEl.firstChild) {
      if (messagesEl.firstChild === emptyState) break;
      messagesEl.removeChild(messagesEl.firstChild);
    }
    if (emptyState) {
      messagesEl.appendChild(emptyState);
      showEmpty();
    }
    inputEl.focus();
  }

  /* ── Event listeners ── */
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);
  clearBtn.addEventListener('click', clearChat);

  /* Auto-resize textarea */
  inputEl.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
  });

  inputEl.focus();
})();
</script>
